<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Capture App</title>
  <style>
    /* Basic Reset & Mobile-First Styling */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background-color: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    
    .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    /* Input Section */
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
    button { padding: 12px 20px; border: none; border-radius: 6px; background: #007bff; color: white; font-size: 16px; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    /* Camera & Preview Section */
    .media-container { width: 100%; position: relative; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 20px; display: none; aspect-ratio: 3/4; }
    video, img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    /* Overlay Buttons (Snap & Switch) */
    .snap-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); border-radius: 50px; padding: 15px 30px; z-index: 10; }
    .switch-btn { 
      position: absolute; 
      top: 15px; 
      right: 15px; 
      border-radius: 50%; 
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6); 
      font-size: 20px; 
      z-index: 10; 
      border: none;
      color: white;
    }
    .switch-btn:hover { background: rgba(0,0,0,0.8); }

    /* Action Buttons */
    .action-buttons { display: flex; gap: 10px; justify-content: space-between; display: none; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #218838; }

    /* Loading Overlay */
    #loading { display: none; text-align: center; color: #555; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="input-group" id="setupSection">
      <input type="text" id="fileName" placeholder="Enter name for photo" autocomplete="off">
      <button id="startBtn">Capture</button>
    </div>

    <div class="media-container" id="cameraContainer">
      <video id="video" autoplay playsinline></video>
      <button id="switchCameraBtn" class="switch-btn" aria-label="Switch Camera">🗘</button>
      <button id="snapBtn" class="snap-btn">Snap Photo</button>
    </div>

    <div class="media-container" id="previewContainer">
      <img id="photoPreview" alt="Captured Photo">
    </div>

    <div class="action-buttons" id="actionButtons">
      <button id="recaptureBtn" class="btn-secondary">Recapture</button>
      <button id="confirmBtn" class="btn-success">Confirm & Upload</button>
    </div>
    
    <p id="loading">Saving your photo...</p>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    // --- CONFIGURATION ---
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVjKf5dZyrhPauCpEizrFPxSYkaRwOHhiHu1X-5MF-NzA7G5jCfX5l2aKUzYtNpWak/exec'; 
    // ---------------------

    // DOM Elements
    const fileNameInput = document.getElementById('fileName');
    const startBtn = document.getElementById('startBtn');
    
    const cameraContainer = document.getElementById('cameraContainer');
    const video = document.getElementById('video');
    const snapBtn = document.getElementById('snapBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    
    const previewContainer = document.getElementById('previewContainer');
    const photoPreview = document.getElementById('photoPreview');
    const actionButtons = document.getElementById('actionButtons');
    
    const recaptureBtn = document.getElementById('recaptureBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const loadingMsg = document.getElementById('loading');
    const canvas = document.getElementById('canvas');

    let stream = null;
    let base64Image = null;
    let currentFacingMode = 'user'; // Default to front camera

    // Core Camera Initialization Function
    async function startCamera() {
      // Stop any existing streams before starting a new one
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      
      try {
        stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: currentFacingMode }, 
          audio: false 
        });
        video.srcObject = stream;
      } catch (err) {
        alert("Camera access denied or unavailable.");
        console.error("Camera Error:", err);
      }
    }

    // 1. Initial Start Button
    startBtn.addEventListener('click', () => {
      const name = fileNameInput.value.trim();
      if (!name) {
        alert("Please enter a name first.");
        return;
      }

      // Update UI
      fileNameInput.disabled = true;
      startBtn.disabled = true;
      cameraContainer.style.display = 'block';
      
      // Boot up the camera
      startCamera();
    });

    // 2. Switch Camera Direction
    switchCameraBtn.addEventListener('click', () => {
      // Toggle the mode
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      // Restart the stream with the new mode
      startCamera();
    });

    // 3. Snap Photo
    snapBtn.addEventListener('click', () => {
      // Set canvas dimensions to match video frame
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      // Draw video frame to canvas
      const context = canvas.getContext('2d');
      
      // Removed mirroring logic to capture exactly as seen by the sensor (non-mirrored)
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      // Convert to Base64
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      base64Image = dataUrl.split(',')[1]; 
      
      // Show Preview, Hide Camera
      photoPreview.src = dataUrl;
      cameraContainer.style.display = 'none';
      previewContainer.style.display = 'block';
      actionButtons.style.display = 'flex';
      
      // Turn off camera momentarily to save battery
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });

    // 4. Recapture Photo
    recaptureBtn.addEventListener('click', () => {
      previewContainer.style.display = 'none';
      actionButtons.style.display = 'none';
      cameraContainer.style.display = 'block';
      
      // Restart the camera feed with the last used facing mode
      startCamera();
    });

    // 5. Confirm & Upload
    confirmBtn.addEventListener('click', async () => {
      actionButtons.style.display = 'none';
      loadingMsg.style.display = 'block';

      const payload = {
        filename: fileNameInput.value.trim() + '.jpg',
        base64: base64Image
      };

      try {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        
        if(result.status === 'success') {
          alert("Success! Photo saved to Google Drive.");
          resetApp();
        } else {
          throw new Error(result.message);
        }
      } catch (error) {
        alert("Upload failed. Check the console for details.");
        console.error("Upload error:", error);
        actionButtons.style.display = 'flex';
        loadingMsg.style.display = 'none';
      }
    });

    // Helper: Reset app to initial state after successful upload
    function resetApp() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      
      fileNameInput.value = '';
      fileNameInput.disabled = false;
      startBtn.disabled = false;
      
      previewContainer.style.display = 'none';
      loadingMsg.style.display = 'none';
      cameraContainer.style.display = 'none';
    }
  </script>
</body>
</html>
